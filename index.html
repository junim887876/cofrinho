<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro | Ultra Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-color: #6366f1; /* Indigo default */
            --brand-color-rgb: 99, 102, 241;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617; /* Slate 950 */
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        
        /* Dynamic Background Glow */
        .bg-glow {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120vw;
            height: 120vw;
            background: radial-gradient(circle, rgba(var(--brand-color-rgb), 0.15) 0%, rgba(2,6,23,0) 70%);
            z-index: -1;
            transition: background 0.5s ease;
            pointer-events: none;
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* Premium Radio Hack */
        input[type="radio"]:checked + div {
            background-color: rgba(var(--brand-color-rgb), 0.15);
            border-color: var(--brand-color);
            color: white;
            box-shadow: 0 4px 20px 0 rgba(var(--brand-color-rgb), 0.2);
            transform: translateY(-2px);
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Physical Card Look */
        .physical-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
            border-top: 1px solid rgba(255,255,255,0.2);
            border-left: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        .physical-card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg);
            animation: shimmer 6s infinite;
        }
        @keyframes shimmer { 100% { left: 200%; } }

        .input-float:focus-within label, .input-float input:not(:placeholder-shown) + label {
            transform: translateY(-130%) scale(0.85);
            color: var(--brand-color);
        }
    </style>
</head>
<body class="text-slate-300 min-h-screen flex flex-col items-center py-6 px-4 sm:p-8">

    <div class="bg-glow" id="bgGlow"></div>

    <main class="w-full max-w-md w-full glass-panel rounded-[2.5rem] p-1 relative z-10">
        
        <!-- Premium Live Card -->
        <div class="physical-card rounded-[2rem] p-6 m-2 mb-4 flex flex-col gap-6">
            <div class="flex justify-between items-start">
                <div>
                    <div class="text-[10px] font-bold tracking-widest text-slate-400 uppercase mb-1">Valor do Gasto</div>
                    <div id="preview-value" class="text-3xl font-extrabold text-white tracking-tight">R$ 0,00</div>
                </div>
                <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center backdrop-blur-sm border border-white/5">
                    <i data-lucide="wallet" class="w-5 h-5 text-white/70" id="card-icon"></i>
                </div>
            </div>
            
            <div class="flex justify-between items-end mt-2">
                <div>
                    <div id="preview-title" class="text-sm font-semibold text-white/90 truncate max-w-[150px]">O que foi?</div>
                    <div id="preview-category" class="text-xs text-white/50 mt-1 flex items-center gap-1">
                        <i data-lucide="tag" class="w-3 h-3"></i> Categoria
                    </div>
                </div>
                <div id="preview-card" class="text-sm font-medium text-white/70">Conta</div>
            </div>
        </div>

        <form id="expenseForm" class="px-5 pb-6 space-y-7">
            
            <!-- CARTÃO -->
            <div class="space-y-3">
                <div class="flex overflow-x-auto hide-scroll gap-3 pb-2 -mx-2 px-2 snap-x" id="card-container">
                    <!-- Gerado via JS para facilitar as cores -->
                </div>
                <span id="err-cartao" class="text-[11px] text-red-400 hidden flex items-center gap-1"><i data-lucide="alert-circle" class="w-3 h-3"></i> Selecione um cartão</span>
            </div>

            <!-- CATEGORIA -->
            <div class="space-y-3">
                <div class="grid grid-cols-3 gap-2">
                    <label class="cursor-pointer">
                        <input type="radio" name="categoria" value="Lazer" class="peer hidden" required>
                        <div class="p-3 rounded-2xl border border-slate-700/50 bg-slate-800/30 text-xs font-medium text-slate-400 transition-all duration-300 flex flex-col items-center gap-2 text-center">
                            <i data-lucide="gamepad-2" class="w-5 h-5"></i> Lazer
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="categoria" value="Gastos Barbearia" class="peer hidden">
                        <div class="p-3 rounded-2xl border border-slate-700/50 bg-slate-800/30 text-xs font-medium text-slate-400 transition-all duration-300 flex flex-col items-center gap-2 text-center">
                            <i data-lucide="scissors" class="w-5 h-5"></i> Barbearia
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="categoria" value="Seguro Barbearia" class="peer hidden">
                        <div class="p-3 rounded-2xl border border-slate-700/50 bg-slate-800/30 text-xs font-medium text-slate-400 transition-all duration-300 flex flex-col items-center gap-2 text-center">
                            <i data-lucide="shield-check" class="w-5 h-5"></i> Seguro
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="categoria" value="Gastos (Bebidas)" class="peer hidden">
                        <div class="p-3 rounded-2xl border border-slate-700/50 bg-slate-800/30 text-xs font-medium text-slate-400 transition-all duration-300 flex flex-col items-center gap-2 text-center">
                            <i data-lucide="beer" class="w-5 h-5"></i> Bebidas
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="categoria" value="Pessoal" class="peer hidden">
                        <div class="p-3 rounded-2xl border border-slate-700/50 bg-slate-800/30 text-xs font-medium text-slate-400 transition-all duration-300 flex flex-col items-center gap-2 text-center">
                            <i data-lucide="user" class="w-5 h-5"></i> Pessoal
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="categoria" value="Faculdade" class="peer hidden">
                        <div class="p-3 rounded-2xl border border-slate-700/50 bg-slate-800/30 text-xs font-medium text-slate-400 transition-all duration-300 flex flex-col items-center gap-2 text-center">
                            <i data-lucide="graduation-cap" class="w-5 h-5"></i> Faculdade
                        </div>
                    </label>
                </div>
                <!-- Investimento em destaque -->
                 <label class="cursor-pointer block mt-2">
                    <input type="radio" name="categoria" value="Investimento" class="peer hidden">
                    <div class="p-3 rounded-2xl border border-slate-700/50 bg-slate-800/30 text-sm font-medium text-emerald-400 transition-all duration-300 flex items-center justify-center gap-2 text-center">
                        <i data-lucide="trending-up" class="w-4 h-4"></i> Investimento
                    </div>
                </label>
                <span id="err-categoria" class="text-[11px] text-red-400 hidden flex items-center gap-1"><i data-lucide="alert-circle" class="w-3 h-3"></i> Selecione uma categoria</span>
            </div>

            <!-- INPUTS -->
            <div class="space-y-6 pt-2">
                <div class="relative input-float">
                    <input type="text" id="nomeItem" placeholder=" " required
                        class="w-full bg-transparent border-b border-slate-600 px-0 py-2 text-white font-medium focus:outline-none transition-colors peer">
                    <label class="absolute left-0 top-2 text-slate-500 font-medium transition-all duration-200 pointer-events-none">O que você pagou?</label>
                </div>

                <div class="relative input-float">
                    <input type="text" id="valorItem" placeholder=" " inputmode="numeric" required
                        class="w-full bg-transparent border-b border-slate-600 px-0 py-2 text-white text-2xl font-bold focus:outline-none transition-colors peer">
                    <label class="absolute left-0 top-3 text-slate-500 font-medium transition-all duration-200 pointer-events-none">Qual o valor?</label>
                </div>
            </div>

            <!-- BOTÃO -->
            <div class="pt-4">
                <button type="submit" id="btnEnviar" style="background-color: var(--brand-color);" class="w-full py-4 rounded-2xl font-bold text-white shadow-lg active:scale-[0.98] transition-all flex justify-center items-center gap-2 relative overflow-hidden group">
                    <span class="absolute w-0 h-0 transition-all duration-500 ease-out bg-white rounded-full group-hover:w-56 group-hover:h-56 opacity-10"></span>
                    <i data-lucide="check" class="w-5 h-5"></i> Registrar Despesa
                </button>
            </div>
        </form>
    </main>

    <!-- Histórico Local -->
    <div class="w-full max-w-md mt-6 px-2">
        <h3 class="text-xs font-bold tracking-widest text-slate-500 uppercase mb-3 flex items-center gap-2"><i data-lucide="history" class="w-3 h-3"></i> Últimos Registros (Aparelho)</h3>
        <div id="history-container" class="space-y-2">
            <!-- Items injected by JS -->
        </div>
    </div>

    <!-- Tela de Sucesso -->
    <div id="successOverlay" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex flex-col justify-center items-center hidden opacity-0 transition-opacity duration-300">
        <div class="w-24 h-24 bg-emerald-500/10 rounded-full flex items-center justify-center mb-6">
            <i data-lucide="check" class="w-12 h-12 text-emerald-500"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-white mb-2">Sucesso!</h2>
        <p class="text-slate-400 font-medium">Lançado na sua planilha.</p>
    </div>

    <script>
        lucide.createIcons();

        // Configuração dos Cartões (Camaleão)
        const cards = [
            { name: "Nubank", color: "#8b5cf6", rgb: "139, 92, 246", logo: "💳" },
            { name: "PicPay", color: "#22c55e", rgb: "34, 197, 94", logo: "📱" },
            { name: "Santander", color: "#ef4444", rgb: "239, 68, 68", logo: "🏛️" },
            { name: "will bank", color: "#eab308", rgb: "234, 179, 8", logo: "💛" },
            { name: "caixa economica federal", color: "#3b82f6", rgb: "59, 130, 246", logo: "🏦" },
            { name: "banco do brasil", color: "#facc15", rgb: "250, 204, 21", logo: "🔵" },
            { name: "Nubank PJ", color: "#6b21a8", rgb: "107, 33, 168", logo: "💼" }
        ];

        const cardContainer = document.getElementById('card-container');
        cards.forEach(c => {
            const label = document.createElement('label');
            label.className = "cursor-pointer snap-start shrink-0";
            label.innerHTML = `
                <input type="radio" name="cartao" value="${c.name}" class="peer hidden" data-color="${c.color}" data-rgb="${c.rgb}" required>
                <div class="px-4 py-3 rounded-2xl border border-slate-700/50 bg-slate-800/30 text-sm font-semibold text-slate-300 transition-all duration-300 flex items-center gap-2">
                    <span class="text-lg">${c.logo}</span> ${c.name}
                </div>
            `;
            cardContainer.appendChild(label);
        });

        // Elementos
        const form = document.getElementById('expenseForm');
        const root = document.documentElement;
        
        // Preview Real-time
        document.getElementById('nomeItem').addEventListener('input', e => {
            document.getElementById('preview-title').textContent = e.target.value || 'O que foi?';
        });

        document.getElementById('valorItem').addEventListener('input', e => {
            let val = e.target.value.replace(/\D/g, "");
            if (!val) { document.getElementById('preview-value').textContent = "R$ 0,00"; return; }
            val = (val / 100).toFixed(2).replace(".", ",").replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
            e.target.value = "R$ " + val;
            document.getElementById('preview-value').textContent = e.target.value;
        });

        // Eventos Dinâmicos (Camaleão)
        document.querySelectorAll('input[name="cartao"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                root.style.setProperty('--brand-color', e.target.dataset.color);
                root.style.setProperty('--brand-color-rgb', e.target.dataset.rgb);
                document.getElementById('preview-card').textContent = e.target.value;
                document.getElementById('card-icon').style.color = e.target.dataset.color;
            });
        });

        document.querySelectorAll('input[name="categoria"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                document.getElementById('preview-category').innerHTML = `<i data-lucide="tag" class="w-3 h-3"></i> ${e.target.value}`;
                lucide.createIcons();
            });
        });

        // Histórico Local (LocalStorage)
        const historyContainer = document.getElementById('history-container');
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('fintech_history') || '[]');
            historyContainer.innerHTML = history.length ? '' : '<p class="text-slate-600 text-xs">Nenhum lançamento recente.</p>';
            
            history.slice(0, 3).forEach(item => { // Mostra só os 3 últimos
                historyContainer.innerHTML += `
                    <div class="bg-slate-800/50 border border-slate-700/50 rounded-xl p-3 flex justify-between items-center backdrop-blur-sm">
                        <div>
                            <div class="text-sm font-semibold text-white">${item.nome}</div>
                            <div class="text-[10px] text-slate-400">${item.cartao} • ${item.categoria}</div>
                        </div>
                        <div class="font-bold text-slate-300">R$ ${item.valor}</div>
                    </div>
                `;
            });
        }
        loadHistory();

        function saveToHistory(data) {
            const history = JSON.parse(localStorage.getItem('fintech_history') || '[]');
            history.unshift(data); // Adiciona no começo
            localStorage.setItem('fintech_history', JSON.stringify(history.slice(0, 10))); // Salva até 10
            loadHistory();
        }

        // Submissão (Google Forms)
        const GOOGLE_FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSepEjxW5sEXNhrjDj_wA20Dc6pk_GfzpfmdwhGUUSRLFGOOdA/formResponse';

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const cartao = document.querySelector('input[name="cartao"]:checked');
            const categoria = document.querySelector('input[name="categoria"]:checked');
            const nome = document.getElementById('nomeItem');
            const valor = document.getElementById('valorItem');

            // Validação simples visual
            if(!cartao) return document.getElementById('err-cartao').classList.remove('hidden');
            if(!categoria) return document.getElementById('err-categoria').classList.remove('hidden');

            const valorPuro = valor.value.replace('R$ ', '');
            
            const formData = new URLSearchParams();
            formData.append('entry.1676421799', cartao.value);
            formData.append('entry.1449755000', categoria.value);
            formData.append('entry.125552262', nome.value);
            formData.append('entry.1754533976', valorPuro);

            const btn = document.getElementById('btnEnviar');
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Processando...`;

            fetch(GOOGLE_FORM_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            }).then(() => {
                // Sucesso
                saveToHistory({ nome: nome.value, valor: valorPuro, cartao: cartao.value, categoria: categoria.value });
                
                const overlay = document.getElementById('successOverlay');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 50);
                
                setTimeout(() => {
                    overlay.classList.add('opacity-0');
                    setTimeout(() => {
                        overlay.classList.add('hidden');
                        form.reset();
                        btn.innerHTML = `<i data-lucide="check" class="w-5 h-5"></i> Registrar Despesa`;
                        document.getElementById('preview-title').textContent = 'O que foi?';
                        document.getElementById('preview-value').textContent = 'R$ 0,00';
                        document.getElementById('preview-category').innerHTML = `<i data-lucide="tag" class="w-3 h-3"></i> Categoria`;
                        document.getElementById('preview-card').textContent = 'Conta';
                        root.style.setProperty('--brand-color', '#6366f1'); // Reset color
                        root.style.setProperty('--brand-color-rgb', '99, 102, 241');
                        lucide.createIcons();
                    }, 300);
                }, 2000);
            });
        });
    </script>
</body>
</html>
