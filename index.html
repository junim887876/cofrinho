<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COFRINHO BANCOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand-color: #6366f1; --brand-color-rgb: 99, 102, 241; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .bg-glow { position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%); width: 120vw; height: 120vw; background: radial-gradient(circle, rgba(var(--brand-color-rgb), 0.15) 0%, rgba(2,6,23,0) 70%); z-index: -1; pointer-events: none; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="radio"]:checked + div { background-color: rgba(var(--brand-color-rgb), 0.15); border-color: var(--brand-color); color: white; box-shadow: 0 4px 20px 0 rgba(var(--brand-color-rgb), 0.2); transform: translateY(-2px); }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .physical-card { background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%); border-top: 1px solid rgba(255,255,255,0.2); border-left: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .input-float:focus-within label, .input-float input:not(:placeholder-shown) + label { transform: translateY(-130%) scale(0.85); color: var(--brand-color); }
    </style>
</head>
<body class="text-slate-300 min-h-screen flex flex-col items-center py-6 px-4 sm:p-8">

    <div class="bg-glow" id="bgGlow"></div>

    <main class="w-full max-w-md glass-panel rounded-[2.5rem] p-1 relative z-10">
        <div class="physical-card rounded-[2rem] p-6 m-2 mb-4 flex flex-col gap-6">
            <div class="flex justify-between items-start">
                <div>
                    <div class="text-[10px] font-bold tracking-widest text-slate-400 uppercase mb-1">Valor do Gasto</div>
                    <div id="preview-value" class="text-3xl font-extrabold text-white tracking-tight">R$ 0,00</div>
                </div>
                <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center backdrop-blur-sm border border-white/5">
                    <i data-lucide="wallet" class="w-5 h-5 text-white/70" id="card-icon"></i>
                </div>
            </div>
            <div class="flex justify-between items-end mt-2">
                <div>
                    <div id="preview-title" class="text-sm font-semibold text-white/90 truncate max-w-[150px]">O que foi?</div>
                    <div id="preview-category" class="text-xs text-white/50 mt-1 flex items-center gap-1"><i data-lucide="tag" class="w-3 h-3"></i> Categoria</div>
                </div>
                <div id="preview-card" class="text-sm font-medium text-white/70">Conta</div>
            </div>
        </div>

        <form id="expenseForm" class="px-5 pb-6 space-y-7">
            <div class="space-y-3">
                <div class="flex overflow-x-auto hide-scroll gap-3 pb-2 -mx-2 px-2 snap-x" id="card-container"></div>
                <span id="err-cartao" class="text-[11px] text-red-400 hidden flex items-center gap-1"><i data-lucide="alert-circle" class="w-3 h-3"></i> Selecione um cartão</span>
            </div>

            <div class="space-y-3">
                <div class="grid grid-cols-3 gap-2" id="category-container">
                    <!-- Categorias aqui -->
                </div>
                <span id="err-categoria" class="text-[11px] text-red-400 hidden flex items-center gap-1"><i data-lucide="alert-circle" class="w-3 h-3"></i> Selecione uma categoria</span>
            </div>

            <div class="space-y-6 pt-2">
                <div class="relative input-float"><input type="text" id="nomeItem" placeholder=" " required class="w-full bg-transparent border-b border-slate-600 px-0 py-2 text-white font-medium focus:outline-none transition-colors peer"><label class="absolute left-0 top-2 text-slate-500 font-medium transition-all duration-200 pointer-events-none">O que você pagou?</label></div>
                <div class="relative input-float"><input type="text" id="valorItem" placeholder=" " inputmode="numeric" required class="w-full bg-transparent border-b border-slate-600 px-0 py-2 text-white text-2xl font-bold focus:outline-none transition-colors peer"><label class="absolute left-0 top-3 text-slate-500 font-medium transition-all duration-200 pointer-events-none">Qual o valor?</label></div>
            </div>

            <div class="flex gap-2 pt-4">
                <button type="button" id="btnAudio" class="p-4 rounded-2xl bg-white/5 border border-white/10 text-slate-400 active:scale-[0.95] transition-all"><i data-lucide="mic" class="w-6 h-6"></i></button>
                <button type="submit" id="btnEnviar" style="background-color: var(--brand-color);" class="flex-1 py-4 rounded-2xl font-bold text-white shadow-lg active:scale-[0.98] transition-all flex justify-center items-center gap-2"><i data-lucide="check" class="w-5 h-5"></i> Registrar</button>
            </div>
        </form>
    </main>

    <!-- Modal de Confirmação -->
    <div id="confirmModal" class="fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-sm hidden flex flex-col items-center justify-center p-6">
        <div class="glass-panel w-full max-w-sm rounded-3xl p-6 text-center space-y-4">
            <h3 class="text-xl font-bold text-white">Confirma os dados?</h3>
            <div id="modalContent" class="text-sm text-slate-400 bg-slate-800/50 p-4 rounded-xl text-left"></div>
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-3 rounded-xl bg-red-500/10 text-red-400 font-bold">Cancelar</button>
                <button id="btnConfirmarEnvio" class="flex-1 py-3 rounded-xl bg-emerald-500 text-slate-900 font-bold">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const cards = ["Nubank", "PicPay", "Santander", "will bank", "caixa economica federal", "banco do brasil", "Nubank PJ"];
        const categorias = ["Lazer", "Barbearia", "Seguro", "Bebidas", "Pessoal", "Faculdade", "Investimento"];

        // Setup inicial (render dos botões)
        const cardContainer = document.getElementById('card-container');
        cards.forEach(name => {
            const label = document.createElement('label');
            label.className = "cursor-pointer snap-start shrink-0";
            label.innerHTML = `<input type="radio" name="cartao" value="${name}" class="peer hidden"><div class="px-4 py-3 rounded-2xl border border-slate-700/50 bg-slate-800/30 text-sm font-semibold text-slate-300 transition-all">${name}</div>`;
            cardContainer.appendChild(label);
        });

        // Configuração Voz
        const btnAudio = document.getElementById('btnAudio');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pt-BR';

        btnAudio.onclick = () => {
            btnAudio.classList.add('animate-pulse', 'bg-red-500/20');
            recognition.start();
        };

        recognition.onresult = (e) => {
            btnAudio.classList.remove('animate-pulse', 'bg-red-500/20');
            const texto = e.results[0][0].transcript.toLowerCase();
            processarVoz(texto);
        };

        function processarVoz(frase) {
            // Tenta extrair valor (ex: "50 reais")
            const valorMatch = frase.match(/(\d+)/);
            const valor = valorMatch ? valorMatch[0] : "";
            
            // Tenta achar cartão
            const cartao = cards.find(c => frase.includes(c.toLowerCase()));
            
            // Tenta achar categoria
            const categoria = categorias.find(c => frase.includes(c.toLowerCase()));

            // Se faltar dados vitais, avisa
            if (!valor || !cartao) {
                alert("Não entendi tudo. Diga algo como: 'Gastei 50 reais no Nubank para lazer'");
                return;
            }

            // Preenche formulário
            document.getElementById('valorItem').value = "R$ " + valor + ",00";
            document.getElementById('nomeItem').value = frase.replace(/\d+/, '').replace(cartao, '').replace(categoria || '', '').trim();
            
            // Seleciona radio
            document.querySelectorAll('input[name="cartao"]').forEach(r => r.checked = r.value === cartao);
            
            // Abre modal
            mostrarModal(valor, cartao, categoria, document.getElementById('nomeItem').value);
        }

        function mostrarModal(v, c, cat, desc) {
            document.getElementById('modalContent').innerHTML = `
                <p><b>Valor:</b> R$ ${v},00</p>
                <p><b>Cartão:</b> ${c}</p>
                <p><b>Categoria:</b> ${cat || 'Não definida'}</p>
                <p><b>O que:</b> ${desc}</p>
            `;
            document.getElementById('confirmModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('confirmModal').classList.add('hidden'); }
        
        document.getElementById('btnConfirmarEnvio').onclick = () => {
            closeModal();
            document.getElementById('expenseForm').dispatchEvent(new Event('submit'));
        };

        // ... Mantenha o resto da sua lógica de submit (fetch Google Forms) aqui ...
    </script>
</body>
</html>
