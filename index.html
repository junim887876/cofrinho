    <script>
        // Initialize Icons
        lucide.createIcons();

        // Elements
        const form = document.getElementById('expenseForm');
        const prevTitle = document.getElementById('preview-title');
        const prevCat = document.getElementById('preview-category');
        const prevVal = document.getElementById('preview-value');
        const prevCard = document.getElementById('preview-card');
        const inputNome = document.getElementById('nomeItem');
        const inputValor = document.getElementById('valorItem');
        const btnLimpar = document.getElementById('btnLimpar');
        const successOverlay = document.getElementById('successOverlay');

        // URL base do Google Forms (trocamos viewform por formResponse)
        const GOOGLE_FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSepEjxW5sEXNhrjDj_wA20Dc6pk_GfzpfmdwhGUUSRLFGOOdA/formResponse';

        // Real-time Preview logic
        inputNome.addEventListener('input', (e) => {
            prevTitle.textContent = e.target.value || '---';
        });

        function formatCurrency(value) {
            value = value.replace(/\D/g, "");
            value = (value / 100).toFixed(2) + "";
            value = value.replace(".", ",");
            value = value.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
            return "R$ " + value;
        }

        inputValor.addEventListener('input', (e) => {
            let val = e.target.value;
            if (val === "") {
                prevVal.textContent = "R$ 0,00";
                return;
            }
            e.target.value = formatCurrency(val);
            prevVal.textContent = e.target.value;
        });

        document.querySelectorAll('input[name="categoria"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                prevCat.innerHTML = `<i data-lucide="tag" class="w-3 h-3 inline"></i> <span>${e.target.value}</span>`;
                lucide.createIcons();
            });
        });

        document.querySelectorAll('input[name="cartao"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                prevCard.innerHTML = `<i data-lucide="credit-card" class="w-3 h-3 inline"></i> <span>${e.target.value}</span>`;
                lucide.createIcons();
            });
        });

        // Submit to Google Forms via Fetch (no-cors)
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            let isValid = true;

            document.querySelectorAll('[id^="err-"]').forEach(el => el.classList.add('hidden'));

            if(!document.querySelector('input[name="cartao"]:checked')) {
                document.getElementById('err-cartao').classList.remove('hidden');
                isValid = false;
            }
            if(!document.querySelector('input[name="categoria"]:checked')) {
                document.getElementById('err-categoria').classList.remove('hidden');
                isValid = false;
            }
            if(!inputNome.value.trim()) {
                document.getElementById('err-nome').classList.remove('hidden');
                isValid = false;
            }
            if(!inputValor.value.trim() || inputValor.value === "R$ 0,00") {
                document.getElementById('err-valor').classList.remove('hidden');
                isValid = false;
            }

            if(isValid) {
                const cartaoVal = document.querySelector('input[name="cartao"]:checked').value;
                const categoriaVal = document.querySelector('input[name="categoria"]:checked').value;
                const nomeVal = inputNome.value;
                // Remove o "R$ " para facilitar a soma na planilha
                const valorFormatadoPlanilha = inputValor.value.replace('R$ ', ''); 

                // Prepara os dados pro Google Forms
                const formData = new URLSearchParams();
                formData.append('entry.1676421799', cartaoVal);     // Cartão
                formData.append('entry.1449755000', categoriaVal);  // Categoria
                formData.append('entry.125552262', nomeVal);        // Nome do Item
                formData.append('entry.1754533976', valorFormatadoPlanilha); // Valor

                const btn = document.getElementById('btnEnviar');
                const originalText = btn.innerHTML;
                btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Enviando...`;
                lucide.createIcons();
                
                // Envio Silencioso
                fetch(GOOGLE_FORM_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formData
                }).then(() => {
                    // Como é no-cors, o fetch não consegue ler a resposta do Google, 
                    // mas se chegou aqui, o POST foi executado. Mostra o sucesso!
                    successOverlay.classList.remove('hidden');
                    requestAnimationFrame(() => {
                        successOverlay.classList.remove('opacity-0');
                        successOverlay.classList.add('opacity-100');
                    });
                    
                    setTimeout(() => {
                        successOverlay.classList.remove('opacity-100');
                        successOverlay.classList.add('opacity-0');
                        setTimeout(() => {
                            successOverlay.classList.add('hidden');
                            form.reset();
                            btn.innerHTML = originalText;
                            lucide.createIcons();
                            
                            prevTitle.textContent = '---';
                            prevCat.innerHTML = `<i data-lucide="tag" class="w-3 h-3 inline"></i> <span>Selecione...</span>`;
                            prevVal.textContent = 'R$ 0,00';
                            prevCard.innerHTML = `<i data-lucide="credit-card" class="w-3 h-3 inline"></i> <span>Conta</span>`;
                            lucide.createIcons();
                        }, 300);
                    }, 1500);
                }).catch(error => {
                    console.error('Erro ao enviar:', error);
                    btn.innerHTML = `<i data-lucide="x-circle" class="w-5 h-5"></i> Erro`;
                    lucide.createIcons();
                    setTimeout(() => { btn.innerHTML = originalText; lucide.createIcons(); }, 2000);
                });
            }
        });

        btnLimpar.addEventListener('click', () => {
            form.reset();
            document.querySelectorAll('[id^="err-"]').forEach(el => el.classList.add('hidden'));
            prevTitle.textContent = '---';
            prevCat.innerHTML = `<i data-lucide="tag" class="w-3 h-3 inline"></i> <span>Selecione...</span>`;
            prevVal.textContent = 'R$ 0,00';
            prevCard.innerHTML = `<i data-lucide="credit-card" class="w-3 h-3 inline"></i> <span>Conta</span>`;
            lucide.createIcons();
        });
    </script>
</body>
</html>
